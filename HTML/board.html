<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board</title>
    <link rel="shortcut icon" href="../assets/logo/logoDark.svg" type="image/x-icon">
    <link rel="stylesheet" href="../styles/board.css">
    <link rel="stylesheet" href="../styles/dialog-board.css">
    <link rel="stylesheet" href="../styles/board-userInterface.css">
    <link rel="stylesheet" href="../styles/addtask-priority.css">
    <link rel="stylesheet" href="../styles/addtask-contact.css">
    <link rel="stylesheet" href="../styles/addtask-dropdownSelect.css">
    <link rel="stylesheet" href="../styles/addtask.css">
    <link rel="stylesheet" href="../style.css">
</head>

<body onload="initBoardPage()">
    <div class="menu-section">
        <div class="logo-container">
            <img src="../assets/logo/join-mainlogo.svg" alt="join-mainlogo.svg" class="main-logo">
        </div>
        <div class="menu-bar">
            <div class="menu-inner-container">
                <a class='menu-point' href='./summary.html'>
                    <img src="../assets/ui-icons/sum-Icons.svg" alt="sum-Icons.svg">
                    <span>Summary</span>
                </a>
                <a href="./addtask.html" class="menu-point">
                    <img src="../assets/ui-icons/add-Icons.svg" alt="add-Icons.svg">
                    <span>Add Task</span></a>
                <a href="#" class="menu-point menu-point-selected">
                    <img src="../assets/ui-icons/board-Icons.svg" alt="board-Icons.svg">
                    <span>Board</span>
                </a>
                <a href="./contact.html" class="menu-point">
                    <img src="../assets/ui-icons/contact-icons.svg" alt="contact-icons.svg">
                    <span>Contacts</span>
                </a>
            </div>
        </div>
        <div class="privacy-and-security-section">
            <a class="privacy-legal-notice-link">Privacy Policy</a>
            <a href="./legal-notice-internal.html" class="privacy-legal-notice-link">Legal Notice</a>
        </div>
    </div>
    <main class="main-section">
        <header class="header-main-html">
            <div class="app-main-title">
                <h1>Kanban Project Management Tool</h1>
            </div>
            <div class="app-profile-and-help-section">
                <div class="help-icon">
                    <a href="/HTML/help.html"><img src="../assets/ui-icons/help.svg" alt="help.svg"></a>
                </div>
                <div class="profile-initial" id="profileInitial" onclick="showProfileMenu()">G</div>
                <div class="profile-menu" id="profileMenu">
                    <button onclick="window.location.href = '#'">Legal Notice</button>
                    <button onclick="window.location.href = '#'">Privacy Police</button>
                    <button onclick="logOut()">Log out</button>
                </div>
            </div>
        </header>
        <section class="main-content">
            <div class="main-content-board-inner-hug">
                <div class="summary-header">
                    <h2>Board</h2>
                    <div class="input-task-btn">
                        <div class="search-wrapper">
                            <input class="board-input" type="text" placeholder="Find Task" id="boardInput"
                                oninput="initFindTask(this)">
                            <div class="search-icon">
                                <span class="divider"></span>
                                <img src="../assets/ui-icons/search.svg" alt="search symbol">
                            </div>
                        </div>
                        <button onclick="toggleDialog('dialogAddTask','toDo')" class="add-task-btn">Add task <img
                                src="../assets/ui-icons/add-board.svg" alt="plus to add"></button>
                    </div>
                </div>

                <div class="kanban-board">
                    <div class="progress-tasks progress-tasks-todo" id="toDo" ondrop="cardDropped(event)"
                        ondragover="cardDraggedOver(event)" ondragenter="cardEnteringDragZone(event)"
                        ondragleave="cardLeavingDragZone(event)">
                        <div class="progress-tasks-header">
                            <h3>To Do</h3>
                            <button class="add-task-on-board-btn"
                                onclick="toggleDialog('dialogAddTask','toDo')">+</button>
                        </div>
                        <div class="drag-and-drop-tasks"></div>
                    </div>

                    <div class="progress-tasks" id="inProgress" ondrop="cardDropped(event)"
                        ondragover="cardDraggedOver(event)" ondragenter="cardEnteringDragZone(event)"
                        ondragleave="cardLeavingDragZone(event)">
                        <div class="progress-tasks-header">
                            <h3>In progress</h3>
                            <button class="add-task-on-board-btn"
                                onclick="toggleDialog('dialogAddTask','inProgress')">+</button>
                        </div>
                        <div class="drag-and-drop-tasks"></div>
                    </div>

                    <div class="progress-tasks" id="awaitFeedBack" ondrop="cardDropped(event)"
                        ondragover="cardDraggedOver(event)" ondragenter="cardEnteringDragZone(event)"
                        ondragleave="cardLeavingDragZone(event)">
                        <div class="progress-tasks-header">
                            <h3>Await feedback</h3>
                            <button class="add-task-on-board-btn"
                                onclick="toggleDialog('dialogAddTask','awaitFeedBack')">+</button>
                        </div>
                        <div class="drag-and-drop-tasks"></div>
                    </div>

                    <div class="progress-tasks" id="done" ondrop="cardDropped(event)"
                        ondragover="cardDraggedOver(event)" ondragenter="cardEnteringDragZone(event)"
                        ondragleave="cardLeavingDragZone(event)">
                        <div class="progress-tasks-header">
                            <h3>Done</h3>
                        </div>
                        <div class="drag-and-drop-tasks"></div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <dialog class="dialogDesign" id="dialogAddTask" onclick="toggleDialog('dialogAddTask')">
        <section onclick="stopPropagationFunction(event)" id="dialogContentAddTask">
            <section class="dialogAddTask">
                <div class="headerDialogAddTask">
                    <h2>Add Task</h2>
                    <button type="button" onclick="toggleDialog('dialogAddTask')" class="dialog-close-btn"><img
                            src="../assets/ui-icons/Close.svg" alt="Schliessen"></button>
                </div>
                <form class="add-task-form" id="addTaskForm" novalidate>
                    <div class="add-task-content">
                        <div class="add-task align-start">
                            <div class="form-inputs">
                                <label class="required" for="title">Title</label>
                                <input type="text" id="title" name="titel" placeholder="Enter a Title" required
                                    data-error="Title is required">
                            </div>
                            <div class="form-inputs">
                                <label for="description">Description</label>
                                <textarea name="description" id="description"
                                    placeholder="Enter a Description"></textarea>
                            </div>
                            <div class="form-inputs">
                                <label class="required" for="date">Due date</label>
                                <input type="date" id="date" name="date" placeholder="dd/mm/yyyy" required
                                    data-error="Date is required">
                            </div>
                        </div>
                        <hr>
                        <div class="add-task align-end">
                            <fieldset>
                                <legend>Priority</legend>

                                <div class="priority-options">
                                    <button type="button" class="priority-btn urgent" onclick="selectPriority(this)">
                                        Urgent <img src="../assets/ui-icons/urgent.svg" alt="urgent.svg">
                                    </button>
                                    <button type="button" class="priority-btn medium" onclick="selectPriority(this)">
                                        Medium <img src="../assets/ui-icons/medium.svg" alt="medium.svg">
                                    </button>
                                    <button type="button" class="priority-btn low" onclick="selectPriority(this)">
                                        Low <img src="../assets/ui-icons/low.svg" alt="low.svg">
                                    </button>
                                </div>
                            </fieldset>
                            <div class="form-inputs contact-form">
                                <label for="contactInput" id="assignedToLabel"
                                    onclick="assignedToLabelClicked(event)">Assigned to</label>
                                <div class="contact-list-input-container" onclick="initInputContainer(this)">
                                    <input type="text" placeholder="Select contact to assign"
                                        onfocus="initInput(this,event)" onblur="finishedInput(this,event)"
                                        id="contactInput" oninput="initContactListSearch(this,event)">
                                    <img src="../assets/ui-icons/arrow-down.svg" alt="arrow.svg"
                                        onmousedown="event.preventDefault(); event.stopPropagation()">
                                </div>
                                <div class="contact-input-list" id="contactInputList" onmousedown="contactInputListClicked(event)"></div>
                                <div class="selected-contact-field" id="selectedContactField"></div>
                            </div>
                            <div class="form-inputs">
                                <label class="required" for="category">Category</label>
                                <div class="dropdown" id="categoryDropdown">
                                    <button type="button" class="dropdown-trigger" id="category" required
                                        data-error="Category is required" data-custom-dropdown="true"
                                        aria-required="true" aria-haspopup="listbox" aria-expanded="false">
                                        <span class="placeholder" id="dropdownLabel">Select task Category</span>
                                        <img class="arrow" id="dropdownArrow" src="../assets/ui-icons/arrow-down.svg"
                                            alt="arrow-down" />
                                    </button>

                                    <ul class="dropdown-list" id="dropdownList" role="listbox" tabindex="-1"
                                        aria-labelledby="category" hidden>
                                        <li class="dropdown-option" role="option" aria-selected="false"
                                            data-value="Technical Task">Technical Task</li>
                                        <li class="dropdown-option" role="option" aria-selected="false"
                                            data-value="User Story">User Story</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="form-inputs">
                                <label for="subtask">Subtask</label>
                                <input type="text" id="subtask" name="subtask"
                                    placeholder="Add subtasks with Enter" onkeydown="addEditSubtask(event)">
                            </div>
                        </div>
                    </div>
                    <div class="add-task-footer">
                        <p class="required">This field is required</p>
                        <div class="add-task-buttons">
                            <button type="button" onclick="clearAllInput()" class="add-task-button btn-secondary">Clear
                                <img src="../assets/ui-icons/Close.svg" alt="Schliessen"></button>
                            <button type="submit" class="add-task-button btn-main">Create task <img
                                    src="../assets/ui-icons/check.svg" alt="check.svg"></button>
                        </div>

                    </div>
                </form>
            </section>
        </section>
    </dialog>

    <dialog class="dialogDesign" id="dialogEditTask" onclick="toggleDialog('dialogEditTask')">
        <section onclick="stopPropagationFunction(event)" id="dialogContentEditTask" class="dialog-task-board-card">

        </section>
    </dialog>

    <dialog class="dialogDesign" id="dialogOpenBigCard" onclick="toggleDialog('dialogOpenBigCard')">
        <section onclick="stopPropagationFunction(event)" id="dialogContentOpenTask">
            <div id="dialogTaskContent"></div>
        </section>
    </dialog>
    <dialog class="dialogAddAndEditTaskDesign" id="successDialog">
        <p>Task added to board</p><img src="../assets/ui-icons/board-Icons.svg" alt="board-Icon">
    </dialog>
    <dialog class="dialogAddAndEditTaskDesign" id="editSuccessDialog">
        <p>Edit Task successful!</p><img src="../assets/ui-icons/edit.svg" alt="edit-Icon">
    </dialog>
    <dialog class="dialogAddAndEditTaskDesign" id="deleteSuccessDialog">
        <p>Delete Task successful!</p><img src="../assets/ui-icons/delete.svg" alt="delete">
    </dialog>

</body>
<script src="../js/validateForm.js"></script>
<script src="../js/boardData.js"></script>
<script src="../js/boardTemplate.js"></script>
<script src="../js/boardTaskCards.js"></script>
<script src="../js/boardRender.js"></script>
<script src="../js/boardDialogTask.js"></script>
<script src="../js/boardUserInterface.js"></script>
<script src="../js/addTask.js"></script>
<script src="../script.js"></script>

</html>
