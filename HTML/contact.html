<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="shortcut icon" href="../assets/logo/logoDark.svg" type="image/x-icon">
    <link rel="stylesheet" href="../styles/contact-static.css">
    <link rel="stylesheet" href="../styles/contact-overlay.css">
    <link rel="stylesheet" href="../styles/contact-userInterface.css">

    <link rel="stylesheet" href="../style.css">
</head>

<body onload="initContactPage()">
    <div class="menu-section">
        <div class="logo-container">
            <img src="../assets/logo/join-mainlogo.svg" alt="join-mainlogo.svg" class="main-logo">
        </div>
        <div class="menu-bar">
            <div class="menu-inner-container">
                <a class='menu-point ' href='./summary.html'>
                    <img src="../assets/ui-icons/sum-Icons.svg" alt="sum-Icons.svg">
                    <span>Summary</span>
                </a>
                <a href="./addtask.html" class="menu-point">
                    <img src="../assets/ui-icons/add-Icons.svg" alt="add-Icons.svg">
                    <span>Add Task</span></a>
                <a href="./board.html" class="menu-point">
                    <img src="../assets/ui-icons/board-Icons.svg" alt="board-Icons.svg">
                    <span>Board</span>
                </a>
                <a href="#" class="menu-point menu-point-selected">
                    <img src="../assets/ui-icons/contact-icons.svg" alt="contact-icons.svg">
                    <span>Contacts</span>
                </a>
            </div>
        </div>
        <div class="privacy-and-security-section">
            <div class="privacy-button-box"><span>Privacy Policy</span></div>
            <div class="legal-notice-box"><span>Legal Notice</span></div>
        </div>
    </div>
    <main class="main-section">
        <header class="header-main-html">
            <div class="app-main-title">
                <h1>Kanban Project Management Tool</h1>
            </div>
            <div class="app-profile-and-help-section">
                <div class="help-icon">
                    <img src="../assets/ui-icons/help.svg" alt="help.svg">
                </div>
                <div class="profile-initial" id="profileInitial" onclick="showProfileMenu()">G</div>
                <div class="profile-menu" id="profileMenu">
                    <button onclick="window.location.href = '#'">Legal Notice</button>
                    <button onclick="window.location.href = '#'">Privacy Police</button>
                    <button onclick="logOut()">Log out</button>
                </div>
            </div>
        </header>
        <section class="main-content">
            <div class="contact-list">
                <div class="add-contact-button-parent" onclick="initOverlayAddContact()">
                    <div class="add-contact-button">
                        <span>Add new contact</span>
                        <img src="../assets/ui-icons/person_add.svg" alt="person_add.svg">
                    </div>
                </div>
                <div class="contact-main-list-parent" id="contactMainListParent"></div>
            </div>
            <div class="contact-expanded-field" onclick="closeExpandingCards()">
                <div class="contact-expanded-field-inner-container">
                    <div class="contact-responsive-back-button-parent"></div>
                    <div class="contact-static-title">
                        <div class="contact-txt"><span>Contacts</span></div>
                        <div class="contact-border-line"></div>
                        <div class="contact-subtitle"><span>Better with a team </span></div>
                    </div>
                    <div id="contactCardExpandedRenderTarget"></div>
                    <div class="contact-success-message-parent"></div>
                </div>
            </div>
        </section>
    </main>
    <div class="contact-overlay" id="contactAddOverlay">
        <div class="contact-overlay-inner-container">
            <div class="contact-overlay-form">
                <div class="contact-overlay-form-header">
                    <div class="contact-overlay-form-header-inner-hug">
                        <div class="contact-overlay-form-fist-section">
                            <div class="contact-overlay-form-close-bar-responsive">
                                <img src="../assets/ui-icons/Close--white--resp.svg" alt="Close--white--resp.svg">
                            </div>
                        </div>
                        <div class="contact-overlay-form-second-section">
                            <div class="contact-overlay-form-logo-container">
                                <img src="../assets/logo/join-mainlogo.svg" alt="join-mainlogo.svg">
                            </div>
                            <div class="contact-overlay-form-title-container">
                                <span>Add contact</span>
                            </div>
                            <div class="contact-overlay-form-subtitle-container">
                                <span>Tasks are better with a team!</span>
                            </div>
                            <div class="contact-overlay-form-border-line"></div>
                        </div>
                    </div>
                </div>
                <div class="contact-overlay-form-body">
                    <div class="contact-overlay-form-body-inner-hug">
                        <div class="contact-overlay-form-body-first-section">
                            <div class="contact-overlay-form-body-round-initial">
                                <img src="../assets/ui-icons/person.svg" alt="person.svg">
                            </div>
                        </div>
                        <div class="contact-overlay-form-body-second-section">
                            <div class="contact-overlay-form-close-bar-desktop">
                                <img src="../assets/ui-icons/Close.svg" alt="Close.svg" onclick="closeOverlayAddContact()">
                            </div>
                            <div class="contact-overlay-form-name-container">
                                <input type="text" id="contactOverlayFormName" placeholder="Name">
                                <img src="../assets/ui-icons/person--grey.svg" alt="person--grey.svg">
                            </div>
                            <div class="contact-overlay-error" id="contactOverlayFormNameContainerError"></div>
                            <div class="contact-overlay-form-email-container">
                                <input type="text" id="contactOverlayFormEmail" placeholder="Email">
                                <img src="../assets/ui-icons/mail.svg" alt="mail.svg">
                            </div>
                            <div class="contact-overlay-error" id="contactOverlayFormEmailContainerError"></div>
                            <div class="contact-overlay-form-phone-container">
                                <input type="text" id="contactOverlayFormPhone" placeholder="Phone">
                                <img src="../assets/ui-icons/call.svg" alt="call.svg">
                            </div>
                            <div class="contact-overlay-error" id="contactOverlayFormPhoneContainerError"></div>
                            <div class="contact-overlay-functions">
                                <div class="contact-overlay-function-cancel-container">
                                    <span>Cancel</span>
                                    <img src="../assets/ui-icons/cancel.svg" alt="cancel.svg">
                                </div>
                                <div class="contact-overlay-function-check-container">
                                    <span>Create contact</span>
                                    <img src="../assets/ui-icons/check.svg" alt="cancel.svg">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
<script src="../js/contactData.js"></script>
<script src="../js/contactTemplate.js"></script>
<script src="../js/contactRender.js"></script>
<script src="../js/contactUserInterface.js"></script>
<script src="../script.js"></script>

</html>
