<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="shortcut icon" href="./assets/logo/logoDark.svg" type="image/x-icon">
    <link rel="stylesheet" href="../styles/contact-static.css">
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="menu-section">
        <div class="logo-container">
            <img src="../assets/logo/join-mainlogo.svg" alt="join-mainlogo.svg" class="main-logo">
        </div>
        <div class="menu-bar">
            <div class="menu-inner-container">
                <a class='menu-point ' href='./summary.html'>
                    <img src="../assets/ui-icons/sum-Icons.svg" alt="sum-Icons.svg">
                    <span>Summary</span>
                </a>
                <a href="index copy 2.html" class="menu-point">
                    <img src="../assets/ui-icons/add-Icons.svg" alt="add-Icons.svg">
                    <span>Add Task</span></a>
                <a href="index copy 3.html" class="menu-point">
                    <img src="../assets/ui-icons/board-Icons.svg" alt="board-Icons.svg">
                    <span>Board</span>
                </a>
                <a href="index copy 4.html" class="menu-point menu-point-selected">
                    <img src="../assets/ui-icons/contact-icons.svg" alt="contact-icons.svg">
                    <span>Contacts</span>
                </a>
            </div>
        </div>
        <div class="privacy-and-security-section">
            <div class="privacy-button-box"><span>Privacy Policy</span></div>
            <div class="legal-notice-box"><span>Legal Notice</span></div>
        </div>
    </div>
    <main class="main-section">
        <header class="header-main-html">
            <div class="app-main-title">
                <h1>Kanban Project Management Tool</h1>
            </div>
            <div class="app-profile-and-help-section">
                <div class="help-icon">
                    <img src="../assets/ui-icons/help.svg" alt="help.svg">
                </div>
                <div class="profile-initial">SM</div>
            </div>
        </header>
        <section class="main-content">
            <div class="contact-list">
                <div class="add-contact-button-parent">
                    <div class="add-contact-button">
                        <span>Add new contact</span>
                        <img src="../assets/ui-icons/person_add.svg" alt="person_add.svg">
                    </div>
                </div>
                <div class="contact-main-list-parent">
                    <div class="contact-card letter-border">
                        <div class="leter-border-letter-box">A</div>
                        <div class="letter-border-line"></div>
                    </div>
                    <div class="contact-card contacts-member" onclick="clicked(this)">
                        <div class="contacts-member-circle-initial"><span>AS</span></div>
                        <div class="contacts-member-name-and-email-parent">
                            <div class="contacts-member-name"><span>Anja Schulz</span></div>
                            <div class="contacts-member-email"><span>schulz@hotmail.com</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="contact-expanded-field">
                <div class="contact-expanded-field-inner-container">
                    <div class="contact-responsive-back-button-parent"></div>
                    <div class="contact-static-title">
                        <div class="contact-txt"><span>Contacts</span></div>
                        <div class="contact-border-line"></div>
                        <div class="contact-subtitle"><span>Better with a team </span></div>
                    </div>
                    <div class="contact-main-expanded-card">
                        <div class="contact-expanded-name-and-functions"></div>
                        <div class="contact-info-txt"></div>
                        <div class="contact-telephone-and-email-parent">
                            <div class="contact-email-txt"></div>
                            <div class="contact-email" id="contactEmail"></div>
                            <div class="contact-phone-txt"></div>
                            <div class="contact-phone" id="contactPhone"></div>
                        </div>
                    </div>
                    <div class="contact-success-message-parent"></div>
                </div>
            </div>
        </section>
    </main>

</body>
<script src="../js/contactData.js"></script>
<script src="../js/contactTemplate.js"></script>
<script src="../js/contactRender.js"></script>
<script src="../js/contactUserInterface.js"></script>
<script src="../script.js"></script>
</html>
