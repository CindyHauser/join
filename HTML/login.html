<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="../assets/logo/logoDark.svg" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/loginSignup.css">
</head>

<body class="body-login-signup">
    <header class="header-login-signup content-limit">
        <img src="../assets/logo/logoDark.svg" alt="LogoDark" class="logoDark">
        <div class="login-signup-section">
            <span class="login-span">Not a Join user?</span>
            <button class="login-signup-btn" onclick="window.location.href='signup.html'">Sign Up</button>
        </div>
    </header>
    
    <main class="main-login-signup content-limit">
        <div class="login-signup-container">
            <div class="h1-login-signup">
                <h1>Log in</h1>
                <div class="h-line"></div>
            </div>

            <form action="/login" method="POST" class="login-signup-form">
                <input type="email" id="email" name="email" class="input-icon" placeholder="Enter your email" required>

                <input type="password" id="password" name="password" class="input-icon"
                    placeholder="Enter your password" required>
                <div class="form-btn">
                    <button type="submit" class="login-signup-btn">Log in</button>
                    <button type="button" class="login-btn-guest" onclick="window.location.href='../index.html'">Guest Log
                        in</button>
                </div>

            </form>
        </div>
    </main>

    <footer class="footer-login-signup content-limit">
        <nav>
            <a class="privacy-button-box" href="'#">Privacy Policy</a>
            <a class="legal-notice-box" href="#">Legal notice</a>
        </nav>
    </footer>

</body>

</html>
