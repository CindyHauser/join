<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary</title>
    <link rel="shortcut icon" href="../assets/logo/logoDark.svg" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/summary.css">
</head>

<body>

    <div class="menu-section">
        <div class="logo-container">
            <img src="../assets/logo/join-mainlogo.svg" alt="join-mainlogo.svg" class="main-logo">
        </div>
        <div class="menu-bar">
            <div class="menu-inner-container">
                <a class='menu-point menu-point-selected' href='#'>
                    <img src="../assets/ui-icons/sum-Icons.svg" alt="sum-Icons.svg">
                    <span>Summary</span>
                </a>
                <a href="./addtask.html" class="menu-point">
                    <img src="../assets/ui-icons/add-Icons.svg" alt="add-Icons.svg">
                    <span>Add Task</span></a>
                <a href="./board.html" class="menu-point">
                    <img src="../assets/ui-icons/board-Icons.svg" alt="board-Icons.svg">
                    <span>Board</span>
                </a>
                <a href="./contact.html" class="menu-point">
                    <img src="../assets/ui-icons/contact-icons.svg" alt="contact-icons.svg">
                    <span>Contacts</span>
                </a>
            </div>
        </div>
        <div class="privacy-and-security-section">
            <a class="privacy-legal-notice-link">Privacy Policy</a>
            <a class="privacy-legal-notice-link">Legal Notice</a>
        </div>
    </div>
    <main class="main-section">
        <header class="header-main-html">
            <div class="app-main-title">
                <h1>Kanban Project Management Tool</h1>
            </div>
            <div class="app-profile-and-help-section">
                <div class="help-icon">
                    <img src="../assets/ui-icons/help.svg" alt="help.svg">
                </div>
                <div class="profile-initial" id="profileInitial" onclick="showProfileMenu()">G</div>
                <div class="profile-menu" id="profileMenu">
                    <button onclick="window.location.href = '#'">Legal Notice</button>
                    <button onclick="window.location.href = '#'">Privacy Police</button>
                    <button onclick="logOut()">Log out</button>
                </div>
            </div>
        </header>
        <section class="main-content">
            <div class="summary-container">
                <div class="summary-header">
                    <h2>Join 360</h2>
                    <div class="v-line-header"></div>
                    <p>Key Metrics at a Glance</p>
                </div>
                <div class="metrics-wrapper">
                <div class="summary-metrics">
                    <div onclick="window.location.href = '../HTML/board.html'" class="metric-card transform-origin-left">
                        <div class="summary-icon-container">
                            <img src="../assets/ui-icons/edit.svg" alt="edit.svg" class="summary-icon">
                        </div>
                        <div class="space-between">
                            <h2 id="numberToDo">0</h2>
                            <p id="todoTasks">To-Do</p>
                        </div>

                    </div>
                    <div onclick="window.location.href = '../HTML/board.html'" class="metric-card transform-origin-right">
                        <div class="summary-icon-container">
                            <img src="../assets/ui-icons/done.svg" alt="done.svg" class="summary-icon">
                        </div>
                        <div class="space-between">
                            <h2 id="numberDoneTasks">0</h2>
                            <p id="doneTasks">Done</p>
                        </div>
                    </div>
                </div>

                <div class="summary-metrics">
                    <div onclick="window.location.href = '../HTML/board.html'" class="metric-card transform-origin-top">
                        <div class="summary-icon-container small bg-red">
                            <img src="../assets/ui-icons/urgent.svg" alt="urgent.svg" class="summary-icon">
                        </div>
                        <div class="space-between">
                            <h2 id="numberOfUrgent">0</h2>
                            <p id="urgentTasks">Urgent</p>
                        </div>
                        <div class="v-line-urgent"></div>
                        <div class="space-between">
                            <h3 id="urgentDate">October 15, 2026</h3>
                            <p>Upcoming Deadline</p>
                        </div>

                    </div>
                </div>

                <div class="summary-metrics">
                    <div onclick="window.location.href = '../HTML/board.html'" class="metric-card flex-column transform-origin-left">
                        <h2 id="numberTotalTasks">0</h2>
                        <p id="totalTasks">Task in Board</p>
                    </div>
                    <div onclick="window.location.href = '../HTML/board.html'" class="metric-card flex-column">
                        <h2 id="numberPendingTasks">0</h2>
                        <p id="pendingTasks">Tasks in Progress</p>
                    </div>
                    <div onclick="window.location.href = '../HTML/board.html'" class="metric-card flex-column transform-origin-right">
                        <h2 id="numberAwaitingFeedback">0</h2>
                        <p id="awaitingFeedback">Awaiting Feedback</p>
                    </div>
                </div>
                </div>
            </div>
            <div class="greeting-section">
                <h3>Good morning<span id="greetingUser">!</span></h3>
                <h2 id="greetingUserName"></h2>
            </div>
        </section>

    </main>

</body>
<script src="../script.js"></script>
<script src="../js/summary.js"></script>

</html>
