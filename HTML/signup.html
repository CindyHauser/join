<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="shortcut icon" href="../assets/logo/logoDark.svg" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/loginSignup.css">
</head>

<body class="body-login-signup">
    <header class="header-login-signup content-limit">
        <img src="../assets/logo/logoDark.svg" alt="LogoDark" class="logoDark">
    </header>
    <main class="main-login-signup content-limit">
        <div class="login-signup-container">
            <a href="login.html" class="back-arrow">&#8592;</a>
            <div class="h1-login-signup">
                <h1>Sign up</h1>
                <div class="h-line"></div>
            </div>
            <form action="/signup" method="POST" class="login-signup-form">
                <input type="text" id="name" name="name" class="input-icon bg-input-name" placeholder="Enter your name" autocomplete="name" required>

                <input type="email" id="email" name="email" class="input-icon bg-input-mail" placeholder="Enter your email" autocomplete="email" required>

                <input type="password" id="password" name="password" class="input-icon bg-input-password"
                    placeholder="Enter your password" autocomplete="new-password" required>

                <input type="password" id="confirm-password" name="confirm-password" class="input-icon bg-input-password"
                    placeholder="Confirm your password" required>
                <div class="terms-container">
                    <input type="checkbox" class="checkbox" id="terms" name="terms" required>
                    <label for="terms" class="terms-label">I agree to the <a href="#">Privacy Policy</a></label>
                </div>
                <div class="form-btn">
                    <button type="submit" class="login-signup-btn">Sign up</button>
                </div>
            </form>
        </div>
    </main>
    <footer class="footer-login-signup content-limit">
        <nav>
            <a class="privacy-button-box" href="#">Privacy Policy</a>
            <a class="legal-notice-box" href="#">Legal notice</a>
        </nav>
    </footer>
</body>

</html>
