<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Custom Dropdown</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      padding: 40px;
    }

    .dropdown {
      position: relative;
      width: 260px;
    }

    .dropdown-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #333;
    }

    .dropdown-trigger[aria-expanded="true"] {
      border-color: #888;
    }

    .dropdown-trigger .placeholder {
      color: #333;
    }

    .dropdown-trigger .arrow {
      width: 12px;
      height: 12px;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .dropdown-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: none;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      list-style: none;
      margin: 0;
      padding: 4px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 10;
    }

    .dropdown-list[hidden] {
      display: none;
    }

    .dropdown-option {
      padding: 9px 10px;
      border-radius: 4px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
    }

    .dropdown-option:hover,
    .dropdown-option.active {
      background: #f0f0f0;
    }

    .dropdown-option[aria-selected="true"] {
      font-weight: 600;
    }

    .dropdown-trigger.input-error {
      border-color: #d33;
    }

    .error-message {
      color: #d33;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>

<body>

  <div class="form-inputs">
    <label class="required" for="category">Category</label>

    <div class="dropdown" id="categoryDropdown">
      <button type="button" class="dropdown-trigger" id="category" required data-error="Category is required"
        data-custom-dropdown="true" aria-required="true" aria-haspopup="listbox" aria-expanded="false">
        <span class="placeholder" id="dropdownLabel">Select task Category</span>
        <img class="arrow" id="dropdownArrow" src="assets/ui-icon/arrow_down.svg" alt="" />
      </button>

      <ul class="dropdown-list" id="dropdownList" role="listbox" tabindex="-1" aria-labelledby="category" hidden>
        <li class="dropdown-option" role="option" aria-selected="false" data-value="Technical Task">Technical Task</li>
        <li class="dropdown-option" role="option" aria-selected="false" data-value="User Story">User Story</li>
      </ul>
    </div>
  </div>

  <script>
    const dropdown = document.getElementById('categoryDropdown');
    const trigger = document.getElementById('category');
    const label = document.getElementById('dropdownLabel');
    const arrow = document.getElementById('dropdownArrow');
    const list = document.getElementById('dropdownList');
    const options = Array.from(list.querySelectorAll('.dropdown-option'));

    let activeIndex = -1;

    function openList() {
      list.hidden = false;
      trigger.setAttribute('aria-expanded', 'true');
      arrow.src = 'assets/ui-icon/arrow_up.svg';
      activeIndex = options.findIndex(o => o.getAttribute('aria-selected') === 'true');
      if (activeIndex === -1) activeIndex = 0;
      setActive(activeIndex);
      list.focus();
    }

    function closeList() {
      list.hidden = true;
      trigger.setAttribute('aria-expanded', 'false');
      arrow.src = 'assets/ui-icon/arrow_down.svg';
    }

    function toggleList() {
      list.hidden ? openList() : closeList();
    }

    function setActive(index) {
      options.forEach(o => o.classList.remove('active'));
      options[index].classList.add('active');
      activeIndex = index;
    }

    function selectOption(option) {
      options.forEach(o => o.setAttribute('aria-selected', 'false'));
      option.setAttribute('aria-selected', 'true');
      label.textContent = option.textContent;
      trigger.dataset.value = option.dataset.value;

      // eigenes Event, damit initValidation() den Fehler beim Auswählen löschen kann
      trigger.dispatchEvent(new Event('customchange', { bubbles: true }));

      closeList();
      trigger.focus();
    }

    trigger.addEventListener('click', toggleList);

    options.forEach((option, index) => {
      option.addEventListener('click', () => selectOption(option));
      option.addEventListener('mouseenter', () => setActive(index));
    });

    trigger.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openList();
      }
    });

    list.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setActive((activeIndex + 1) % options.length);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActive((activeIndex - 1 + options.length) % options.length);
      } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectOption(options[activeIndex]);
      } else if (e.key === 'Escape') {
        closeList();
        trigger.focus();
      } else if (e.key === 'Tab') {
        closeList();
      }
    });

    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target)) closeList();
    });

    // --- Angepasste Validierung ---
    // Ergänzt um Behandlung für Custom-Dropdowns (data-custom-dropdown="true"):
    // - Wert kommt aus dataset.value statt .value
    // - Clear-Event ist "customchange" statt "input"

    function initValidation(form) {

      const fields = form.querySelectorAll("[required]");

      fields.forEach(field => {

        const errorId = `${field.id}Error`;
        let error = document.getElementById(errorId);
        if (!error) {
          error = document.createElement("p");
          error.id = errorId;
          error.classList.add("error-message");
          if (field.type === "checkbox") {
            const container = field.closest(".terms-container");

            if (container) {
              container.insertAdjacentElement("afterend", error);
            } else {
              field.insertAdjacentElement("afterend", error);
            }

          } else {
            field.insertAdjacentElement("afterend", error);
          }

        }
        field.errorElement = error;

        const isCustomDropdown = field.dataset.customDropdown === "true";
        const event = field.type === "checkbox"
          ? "change"
          : isCustomDropdown
            ? "customchange"
            : "input";

        field.addEventListener(event, () => {
          field.errorElement.textContent = "";
          field.classList.remove("input-error");
        });
      });

    }

    function validateForm(form) {

      let valid = true;

      const fields = form.querySelectorAll("[required]");

      fields.forEach(field => {

        const error = field.errorElement;

        error.textContent = "";
        field.classList.remove("input-error");

        if (field.type === "checkbox") {

          if (!field.checked) {

            error.textContent = field.dataset.error;
            field.classList.add("input-error");
            valid = false;
          }

          return;
        }

        const isCustomDropdown = field.dataset.customDropdown === "true";
        const value = isCustomDropdown ? (field.dataset.value || "") : field.value;

        if (value.trim() === "") {

          error.textContent = field.dataset.error;
          field.classList.add("input-error");
          valid = false;

          return;
        }

        if (
          field.type === "email" &&
          !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(field.value)
        ) {

          error.textContent = "Please enter a valid email address.";
          field.classList.add("input-error");
          valid = false;
        }

      });

      return valid;
    }
  </script>

</body>

</html>
